,[-112.214,47.267],[-112.182,47.287],[-112.131,47.299],[-112.087,47.326],[-112.011,47.4],[-111.999,47.424],[-111.971,47.471],[-111.936,47.496],[-111.829,47.495],[-111.803,47.511],[-111.744,47.521],[-111.711,47.539],[-111.699,47.541]]}}]};

const map = L.map("map", { preferCanvas: true });

// Stylized basemap matching the NMC logo: the map background is the water (NMC
// blue) and land is drawn as green polygons on top. No raster tiles.
map.attributionControl.addAttribution('Land &copy; <a href="https://www.naturalearthdata.com/">Natural Earth</a>');

// Place-name labels (cities, towns, regions) overlaid above the land but below
// the markers, so the stylized map still carries its geographic information.
map.createPane("labels");
map.getPane("labels").style.zIndex = 450;
map.getPane("labels").style.pointerEvents = "none";
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png", {
  pane: "labels", maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
}).addTo(map);

fetch("https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_50m_land.geojson")
  .then((r) => r.json())
  .then((land) => {
    L.geoJSON(land, {
      style: { fillColor: "#28B088", fillOpacity: 1, color: "#1f7a5e", weight: 0.6 },
      interactive: false,
    }).addTo(map);
  })
  .catch(() => {});

// Roads (embedded) and provincial / state borders (from CDN), drawn above the
// land but below the place labels and the markers.
map.createPane("lines");
map.getPane("lines").style.zIndex = 410;
map.getPane("lines").style.pointerEvents = "none";
const lineRenderer = L.canvas({ pane: "lines" });
L.geoJSON(BC_ROADS, {
  renderer: lineRenderer,
  style: { color: "#f3efe4", weight: 0.9, opacity: 0.8 },
  interactive: false,
}).addTo(map);
fetch("https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_50m_admin_1_states_provinces_lines.geojson")
  .then((r) => r.json())
  .then((b) => {
    L.geoJSON(b, {
      renderer: lineRenderer,
      style: { color: "#23406e", weight: 1.3, opacity: 0.85, dashArray: "5 4" },
      interactive: false,
    }).addTo(map);
  })
  .catch(() => {});
fetch("https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_50m_admin_0_boundary_lines_land.geojson")
  .then((r) => r.json())
  .then((b) => {
    L.geoJSON(b, {
      renderer: lineRenderer,
      style: { color: "#16264a", weight: 2, opacity: 0.9 },
      interactive: false,
    }).addTo(map);
  })
  .catch(() => {});

// Active community: dark square block showing estimated jobs at stake.
function squareIcon(label) {
  const html = `<svg width="36" height="36" viewBox="0 0 36 36" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))">
    <rect x="2" y="2" width="32" height="32" rx="5" fill="#c8102e" stroke="#fff" stroke-width="2.5"/>
    <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" font-family="Montserrat,system-ui,sans-serif">${label}</text>
  </svg>`;
  return L.divIcon({
    html, className: "",
    iconSize: [36, 36], iconAnchor: [18, 18],
    tooltipAnchor: [0, -18], popupAnchor: [0, -20],
  });
}

// Inactive-only community: black square showing estimated jobs lost.
function lostIcon(label) {
  const html = `<svg width="36" height="36" viewBox="0 0 36 36" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))">
    <rect x="2" y="2" width="32" height="32" rx="5" fill="#2b2b2b" stroke="#fff" stroke-width="2.5"/>
    <text x="18" y="23" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" font-family="Montserrat,system-ui,sans-serif">${label}</text>
  </svg>`;
  return L.divIcon({
    html, className: "",
    iconSize: [36, 36], iconAnchor: [18, 18],
    tooltipAnchor: [0, -18], popupAnchor: [0, -20],
  });
}

const clusters = L.markerClusterGroup({
  maxClusterRadius: 42,
  showCoverageOnHover: false,
  iconCreateFunction: (cluster) => {
    const jobs = cluster.getAllChildMarkers().reduce((s, m) => s + m.options.jobsCount, 0);
    return L.divIcon({ html: `<div class="cluster">${jobs}</div>`, className: "", iconSize: [42, 42] });
  },
});

const bounds = L.latLngBounds([]);
const markerByCity = {};
const markerInfo = [];
let totalOutlets = 0, totalInactive = 0, totalFte = 0, fteCommunities = 0;

// Headline number per community: actual Black Press staff (FTE) where known,
// otherwise the 5-per-outlet estimate; shuttered-only communities show jobs lost.
function cityStats(c) {
  const active = c.outlets.filter((o) => !o.inactive).length;
  const inactive = c.outlets.length - active;
  const hasFte = typeof c.fte === "number";
  let headline, jobText, lost;
  if (active === 0) {
    headline = inactive * JOBS_PER_OUTLET;
    jobText = `${headline} jobs lost`;
    lost = true;
  } else if (hasFte) {
    headline = c.fte;
    jobText = c.fte === 0 ? "0 local FTE" : `${c.fte} staff (FTE)`;
    if (inactive > 0) jobText += ` · ${inactive * JOBS_PER_OUTLET} lost`;
    lost = false;
  } else {
    headline = c.outlets.length * JOBS_PER_OUTLET;
    jobText = `~${headline} jobs (est.)`;
    if (inactive > 0) jobText += ` · ${inactive * JOBS_PER_OUTLET} lost`;
    lost = false;
  }
  return { active, inactive, hasFte, headline, jobText, lost };
}

CITIES.forEach((c) => {
  const s = cityStats(c);
  totalOutlets += c.outlets.length;
  totalInactive += s.inactive;
  if (s.hasFte) { totalFte += c.fte; fteCommunities++; }

  const marker = L.marker(c.ll, {
    icon: s.active > 0 ? squareIcon(s.headline) : lostIcon(s.headline),
    jobsCount: s.headline,
  });

  let countText = c.outlets.length + (c.outlets.length === 1 ? " outlet" : " outlets");
  if (s.inactive > 0) countText += s.active > 0 ? ` (${s.inactive} shuttered)` : " (shuttered)";
  const jobText = s.jobText;
  const hoverHtml = `<b>${c.name}</b><br>${jobText}<br>${countText}`;
  const labelHtml = `<span class="pin-city">${c.name}</span>`;
  marker.bindTooltip(hoverHtml, { direction: "top" });

  const items = c.outlets
    .map((o) => `<li${o.inactive ? ' class="inactive"' : ""}>${o.inactive ? "✕ " : ""}${o.n}${o.inactive ? " (shuttered)" : ""}</li>`)
    .join("");
  const note = c.note ? `<p class="note">${c.note}</p>` : "";
  marker.bindPopup(`<div class="popup"><h2>${c.name}</h2><p class="jobs">${jobText}</p><ul>${items}</ul>${note}</div>`, { maxWidth: 300 });

  clusters.addLayer(marker);
  bounds.extend(c.ll);
  markerByCity[c.name] = marker;
  markerInfo.push({ marker, hoverHtml, labelHtml });
});

map.addLayer(clusters);
map.fitBounds(bounds, { padding: [30, 30] });

// Past this zoom, swap hover tooltips for permanent name labels beside each pin.
const LABEL_ZOOM = 7;
let labelsShown = null;
function updateLabels() {
  const show = map.getZoom() >= LABEL_ZOOM;
  if (show === labelsShown) return;
  labelsShown = show;
  markerInfo.forEach(({ marker, hoverHtml, labelHtml }) => {
    marker.unbindTooltip();
    marker.bindTooltip(
      show ? labelHtml : hoverHtml,
      show
        ? { permanent: true, direction: "right", className: "pin-label", interactive: false, offset: [14, 12] }
        : { direction: "top" }
    );
  });
}
map.on("zoomend", updateLabels);
updateLabels();

// Sidebar: full outlet directory, searchable, click to zoom.
const listEl = document.getElementById("list");
const sorted = [...CITIES].sort((a, b) => a.name.localeCompare(b.name));

function renderList(filter) {
  const q = (filter || "").trim().toLowerCase();
  listEl.innerHTML = "";
  let shown = 0;
  sorted.forEach((c) => {
    const matchCity = c.name.toLowerCase().includes(q);
    const matchedOutlets = c.outlets.filter((o) => o.n.toLowerCase().includes(q));
    if (q && !matchCity && matchedOutlets.length === 0) return;
    shown++;
    const outlets = q && !matchCity ? matchedOutlets : c.outlets;
    const s = cityStats(c);
    const jt = s.jobText;
    const div = document.createElement("div");
    div.className = "city";
    div.innerHTML =
      `<div class="cname">${c.name} <span class="cnt${s.lost ? " lost" : ""}">${jt}</span></div>` +
      `<ul>${outlets
        .map((o) => `<li${o.inactive ? ' class="inactive"' : ""}>${o.inactive ? "✕ " : ""}${o.n}${o.inactive ? " (shuttered)" : ""}</li>`)
        .join("")}</ul>`;
    div.addEventListener("click", () => {
      const m = markerByCity[c.name];
      clusters.zoomToShowLayer(m, () => m.openPopup());
    });
    listEl.appendChild(div);
  });
  if (!shown) listEl.innerHTML = '<div class="nores">No outlets match that search.</div>';
}
renderList("");
document.getElementById("search").addEventListener("input", (e) => renderList(e.target.value));

document.getElementById("toggle").addEventListener("click", () => {
  document.getElementById("sidebar").classList.toggle("hidden");
  map.invalidateSize();
});
// Start with the sidebar hidden on small screens so the map gets the space.
if (window.innerWidth < 700) {
  document.getElementById("sidebar").classList.add("hidden");
  map.invalidateSize();
}

document.getElementById("totals").textContent =
  `${totalFte} Black Press staff (FTE) across ${fteCommunities} BC communities. ` +
  `${totalOutlets} outlets across ${CITIES.length} communities in total, ` +
  `including ${totalInactive} shuttered (est. ${totalInactive * JOBS_PER_OUTLET} jobs lost). British Columbia only.`;
</script>
</body>
</html>
