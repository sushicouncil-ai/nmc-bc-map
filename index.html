<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>News Media Canada Member Outlets — British Columbia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<style>
  html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #app { display: flex; height: 100%; }
  #map { flex: 1; height: 100%; }

  #sidebar {
    width: 320px; min-width: 320px; height: 100%; overflow-y: auto;
    background: #fff; border-right: 1px solid #ddd; box-shadow: 1px 0 4px rgba(0,0,0,.15); z-index: 1001;
  }
  #sidebar.hidden { display: none; }
  .side-head { padding: 14px 16px 10px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1; }
  .side-head h1 { font-size: 18px; margin: 0 0 4px; }
  .side-head p { font-size: 14px; margin: 4px 0; color: #444; }
  #search {
    width: 100%; box-sizing: border-box; margin: 8px 0 6px; padding: 7px 10px;
    border: 1px solid #ccc; border-radius: 6px; font-size: 15px;
  }
  .legend { font-size: 13.5px; color: #444; }
  .legend span.pin { display: inline-block; width: 10px; height: 10px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg); margin: 0 6px 0 1px; border: 1px solid #fff; box-shadow: 0 0 1px #666; }
  .legend .xbadge, .xbadge {
    display: inline-flex; width: 16px; height: 16px; border-radius: 50%;
    background: #2b2b2b; color: #fff; font-size: 11px; font-weight: 900;
    align-items: center; justify-content: center; margin: 0 5px 0 1px; vertical-align: -3px;
    border: 1px solid #fff; box-shadow: 0 0 1px #666;
  }

  #list { padding: 6px 0 20px; }
  .city { padding: 7px 16px; border-bottom: 1px solid #f3f3f3; cursor: pointer; }
  .city:hover { background: #fdf2f3; }
  .cname { font-size: 15.5px; font-weight: 600; color: #222; }
  .cname .cnt { color: #c8102e; font-weight: 700; }
  .city ul { margin: 3px 0 0; padding-left: 18px; }
  .city li { font-size: 14.5px; color: #333; margin: 1px 0; }
  .city li.inactive { color: #999; font-style: italic; }
  .nores { padding: 16px; font-size: 15px; color: #777; }

  #toggle {
    position: absolute; top: 10px; left: 10px; z-index: 1002;
    background: #fff; border: 1px solid #ccc; border-radius: 6px;
    padding: 6px 11px; font-size: 16px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.25);
  }
  #toggle:hover { background: #f5f5f5; }

  .cluster {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(200,16,46,.9); border: 3px solid rgba(255,255,255,.85);
    color: #fff; font-weight: 700; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.4);
  }
  .popup h2 { font-size: 16px; margin: 0 0 6px; }
  .popup ul { margin: 0; padding-left: 18px; font-size: 15px; }
  .popup li { margin: 2px 0; }
  .popup .inactive { color: #888; font-style: italic; }
  .popup .note { font-size: 13px; color: #a45b00; margin: 6px 0 0; }
  .leaflet-tooltip { font-size: 15px; }
  .pin-label {
    background: rgba(255,255,255,.92); border: 1px solid #ccc; border-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,.25); padding: 2px 6px;
    font-size: 13px; line-height: 1.35; color: #222;
  }
  .pin-label .inact { color: #999; font-style: italic; }
  .pin-label::before { display: none; }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="side-head">
      <h1>News Media Canada Member Outlets — BC</h1>
      <p id="totals"></p>
      <input id="search" type="search" placeholder="Search outlets or communities…">
      <div class="legend">
        <span class="pin" style="background:#c8102e"></span>Active &nbsp;
        <span class="xbadge">✕</span>Inactive only<br>
        Click a name to zoom to it. Outlet names appear beside pins as you zoom in.
      </div>
    </div>
    <div id="list"></div>
  </aside>
  <div id="map"></div>
</div>
<button id="toggle" title="Show/hide outlet list">☰ List</button>

const map = L.map("map");
L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
}).addTo(map);

function pinIcon(color, label) {
  const html = `<svg width="34" height="44" viewBox="0 0 34 44" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">
    <path d="M17 1C9 1 2.5 7.4 2.5 15.3 2.5 26 17 43 17 43s14.5-17 14.5-27.7C31.5 7.4 25 1 17 1z" fill="${color}" stroke="#fff" stroke-width="1.5"/>
    <circle cx="17" cy="15.5" r="8.5" fill="#fff" opacity="0.22"/>
    <text x="17" y="20.5" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" font-family="system-ui,sans-serif">${label}</text>
  </svg>`;
  return L.divIcon({
    html, className: "",
    iconSize: [34, 44], iconAnchor: [17, 43],
    tooltipAnchor: [0, -34], popupAnchor: [0, -40],
  });
}

function xIcon() {
  const html = `<svg width="34" height="34" viewBox="0 0 34 34" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))">
    <circle cx="17" cy="17" r="15" fill="#2b2b2b" stroke="#fff" stroke-width="2.5"/>
    <path d="M11 11L23 23M23 11L11 23" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
  </svg>`;
  return L.divIcon({
    html, className: "",
    iconSize: [34, 34], iconAnchor: [17, 17],
    tooltipAnchor: [17, -10], popupAnchor: [0, -18],
  });
}

const clusters = L.markerClusterGroup({
  maxClusterRadius: 42,
  showCoverageOnHover: false,
  iconCreateFunction: (cluster) => {
    const outlets = cluster.getAllChildMarkers().reduce((s, m) => s + m.options.outletCount, 0);
    return L.divIcon({ html: `<div class="cluster">${outlets}</div>`, className: "", iconSize: [42, 42] });
  },
});

const bounds = L.latLngBounds([]);
const markerByCity = {};
const markerInfo = [];
let totalOutlets = 0, totalInactive = 0;

CITIES.forEach((c) => {
  const active = c.outlets.filter((o) => !o.inactive).length;
  const inactive = c.outlets.length - active;
  totalOutlets += c.outlets.length;
  totalInactive += inactive;

  const marker = L.marker(c.ll, {
    icon: active > 0 ? pinIcon("#c8102e", c.outlets.length) : xIcon(),
    outletCount: c.outlets.length,
  });

  let countText = c.outlets.length + (c.outlets.length === 1 ? " outlet" : " outlets");
  if (inactive > 0) countText += active > 0 ? ` (${inactive} inactive)` : " (inactive)";
  const hoverHtml = `<b>${c.name}</b><br>${countText}`;
  const labelHtml = c.outlets
    .map((o) => (o.inactive ? `<span class="inact">✕ ${o.n}</span>` : o.n))
    .join("<br>");
  marker.bindTooltip(hoverHtml, { direction: "top" });

  const items = c.outlets
    .map((o) => `<li${o.inactive ? ' class="inactive"' : ""}>${o.inactive ? "✕ " : ""}${o.n}${o.inactive ? " (inactive)" : ""}</li>`)
    .join("");
  const note = c.note ? `<p class="note">${c.note}</p>` : "";
  marker.bindPopup(`<div class="popup"><h2>${c.name}</h2><ul>${items}</ul>${note}</div>`, { maxWidth: 280 });

  clusters.addLayer(marker);
  bounds.extend(c.ll);
  markerByCity[c.name] = marker;
  markerInfo.push({ marker, hoverHtml, labelHtml });
});

map.addLayer(clusters);
map.fitBounds(bounds, { padding: [30, 30] });

// Past this zoom, swap hover tooltips for permanent name labels beside each pin.
const LABEL_ZOOM = 7;
let labelsShown = null;
function updateLabels() {
  const show = map.getZoom() >= LABEL_ZOOM;
  if (show === labelsShown) return;
  labelsShown = show;
  markerInfo.forEach(({ marker, hoverHtml, labelHtml }) => {
    marker.unbindTooltip();
    marker.bindTooltip(
      show ? labelHtml : hoverHtml,
      show
        ? { permanent: true, direction: "right", className: "pin-label", interactive: false }
        : { direction: "top" }
    );
  });
}
map.on("zoomend", updateLabels);
updateLabels();

// Sidebar: full outlet directory, searchable, click to zoom.
const listEl = document.getElementById("list");
const sorted = [...CITIES].sort((a, b) => a.name.localeCompare(b.name));

function renderList(filter) {
  const q = (filter || "").trim().toLowerCase();
  listEl.innerHTML = "";
  let shown = 0;
  sorted.forEach((c) => {
    const matchCity = c.name.toLowerCase().includes(q);
    const matchedOutlets = c.outlets.filter((o) => o.n.toLowerCase().includes(q));
    if (q && !matchCity && matchedOutlets.length === 0) return;
    shown++;
    const outlets = q && !matchCity ? matchedOutlets : c.outlets;
    const div = document.createElement("div");
    div.className = "city";
    div.innerHTML =
      `<div class="cname">${c.name} <span class="cnt">${c.outlets.length}</span></div>` +
      `<ul>${outlets
        .map((o) => `<li${o.inactive ? ' class="inactive"' : ""}>${o.inactive ? "✕ " : ""}${o.n}${o.inactive ? " (inactive)" : ""}</li>`)
        .join("")}</ul>`;
    div.addEventListener("click", () => {
      const m = markerByCity[c.name];
      clusters.zoomToShowLayer(m, () => m.openPopup());
    });
    listEl.appendChild(div);
  });
  if (!shown) listEl.innerHTML = '<div class="nores">No outlets match that search.</div>';
}
renderList("");
document.getElementById("search").addEventListener("input", (e) => renderList(e.target.value));

document.getElementById("toggle").addEventListener("click", () => {
  document.getElementById("sidebar").classList.toggle("hidden");
  map.invalidateSize();
});
// Start with the sidebar hidden on small screens so the map gets the space.
if (window.innerWidth < 700) {
  document.getElementById("sidebar").classList.add("hidden");
  map.invalidateSize();
}

document.getElementById("totals").textContent =
  `${totalOutlets} outlets across ${CITIES.length} communities (${totalInactive} inactive). British Columbia only.`;
</script>
</body>
</html>
